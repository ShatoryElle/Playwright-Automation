name: CI 30.1 Tests

on: [push, pull_request]

jobs:
  cypress-firefox-run:
    runs-on: ubuntu-latest
    container:
      # Використовуємо базовий образ з Node.js
      image: node:20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Firefox and dependencies
        run: |
          apt-get update && apt-get install -y firefox
          npm install

      - name: Run Cypress in Firefox
        run: npx cypress run --browser firefox
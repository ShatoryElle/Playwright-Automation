name: CI 30.1 Tests

on: [push, pull_request]

jobs:
  cypress-firefox-run:
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:node-20.17.0-chrome-128.0.6613.119-1-ff-129.0.2-edge-128.0.2739.67-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run Cypress in Firefox
        run: npx cypress run --browser firefox
